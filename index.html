const isStandaloneMode = () => {
  try {
    return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
           window.navigator.standalone === true;
  } catch (e) { return false; }
};
const toggleFullscreen = () => {
  if (isStandaloneMode()) { alert("이미 전체화면(앱) 모드로 실행 중이에요."); return; }
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (!fsEl) {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    const fail = () => alert(
      "이 브라우저는 전체화면을 직접 지원하지 않아요.\n\n" +
      "iPhone Safari에서 사파리 UI까지 숨기시려면:\n" +
      "1) 사파리 하단의 공유 버튼(□↑) 누르기\n" +
      "2) '홈 화면에 추가' 선택\n" +
      "3) 홈 화면에 생긴 아이콘으로 다시 열기"
    );
    if (req) { try { const p = req.call(el); if (p && typeof p.catch === "function") p.catch(fail); } catch (e) { fail(); } }
    else { fail(); }
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) { try { exit.call(document); } catch (e) {} }
  }
};

// ─── 키패드 컴포넌트 ───
function Keypad({ onDigit, onClear, onConfirm, allowConfirm, themeColor }) {
  const btnBase = {
    padding: "clamp(22px, 3.2vh, 34px) 8px",
    fontSize: "clamp(28px, 4vw, 38px)",
    fontWeight: 900,
    borderRadius: 16,
    cursor: "pointer",
    border: "none",
    transition: "transform .12s, background .12s"
  };
  const numStyle = { ...btnBase, background: "white", color: "#0f172a", border: "2px solid #e2e8f0", boxShadow: "0 4px 12px rgba(15,23,42,.06)" };
  const clearStyle = { ...btnBase, background: "#FEE2E2", color: "#DC2626", border: "2px solid #FECACA" };
  const confirmStyle = { ...btnBase, background: allowConfirm ? themeColor : "#cbd5e1", color: "white", boxShadow: allowConfirm ? `0 6px 16px ${themeColor}55` : "none" };
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "clamp(8px, 1.4vw, 14px)", maxWidth: 460, margin: "0 auto", width: "100%" }}>
      {[1,2,3,4,5,6,7,8,9].map(d => (
        <button key={d} onClick={() => onDigit(d)} style={numStyle}
          onMouseDown={e => e.currentTarget.style.transform = "scale(.97)"}
          onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
          onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
        >{d}</button>
      ))}
      <button onClick={onClear} style={clearStyle}>지우기</button>
      <button onClick={() => onDigit(0)} style={numStyle}
        onMouseDown={e => e.currentTarget.style.transform = "scale(.97)"}
        onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
        onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
      >0</button>
      <button onClick={onConfirm} disabled={!allowConfirm} style={confirmStyle}>확인</button>
    </div>
  );
}

function AtmKiosk() {
  const [screen, setScreen]       = useState("main");
  const [settings, setSettings]   = useState(DEFAULT_SETTINGS);
  const [editSettings, setEditSettings] = useState(DEFAULT_SETTINGS);
  const [students, setStudents]   = useState([]);
  const [editStudents, setEditStudents] = useState([]);
  const [settingsTab, setSettingsTab] = useState("general");
  const [newStudent, setNewStudent] = useState({ name: "", password: "", balance: "" });
  const [bulkBalance, setBulkBalance] = useState("");

  // 트랜잭션 상태
  const [transactionType, setTransactionType] = useState(""); // withdraw | deposit | transfer | inquiry
  const [currentStudent, setCurrentStudent] = useState(null);
  const [targetStudent, setTargetStudent] = useState(null);
  const [passwordInput, setPasswordInput] = useState("");
  const [amount, setAmount] = useState(0);
  const [customAmount, setCustomAmount] = useState(""); // 직접 입력 (raw digits)
  const [popup, setPopup] = useState(null); // { message, type, onClose? }

  const timerRef = useRef(null);

  const theme = themeOf(settings.themeColor);
  const editTheme = themeOf(editSettings.themeColor);
  const TH = theme.value;
  const TH_DARK = theme.dark;
  const BG = bgOf(theme);

  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
    return () => { try { document.head.removeChild(link); } catch {} };
  }, []);

  // 설정 + 학생 데이터 로드
  useEffect(() => {
    try {
      const s = localStorage.getItem("atm-settings");
      if (s) {
        const p = JSON.parse(s);
        const merged = { ...DEFAULT_SETTINGS, ...p };
        if (!PALETTE.some(t => t.value === merged.themeColor)) merged.themeColor = DEFAULT_SETTINGS.themeColor;
        if (!merged.storeName || !merged.storeName.trim()) merged.storeName = DEFAULT_SETTINGS.storeName;
        setSettings(merged);
        setEditSettings(merged);
      }
    } catch {}
    try {
      const st = localStorage.getItem("atm-students");
      if (st) {
        const arr = JSON.parse(st);
        if (Array.isArray(arr)) {
          setStudents(arr);
          setEditStudents(arr.map(s => ({ ...s })));
        }
      }
    } catch {}
  }, []);

  useEffect(() => () => clearInterval(timerRef.current), []);

  // 학생 데이터 저장 헬퍼
  const persistStudents = (newStudents) => {
    setStudents(newStudents);
    try { localStorage.setItem("atm-students", JSON.stringify(newStudents)); } catch {}
  };

  // 자동 화면 전환
  useEffect(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (screen === "card-insert") {
      timerRef.current = setTimeout(() => {
        if (transactionType === "transfer") setScreen("friend-select");
        else setScreen("password");
      }, 4000);
    } else if (screen === "processing") {
      timerRef.current = setTimeout(() => {
        if (transactionType === "deposit") setScreen("take-card");
        else if (transactionType === "withdraw") setScreen("take-card");
        else if (transactionType === "transfer") setScreen("take-card");
        else if (transactionType === "inquiry") setScreen("inquiry-result");
      }, 2000);
    } else if (screen === "deposit-cash") {
      timerRef.current = setTimeout(() => setScreen("processing"), 4000);
    } else if (screen === "take-card") {
      timerRef.current = setTimeout(() => {
        if (transactionType === "withdraw") setScreen("take-cash");
        else setScreen("thanks");
      }, 4000);
    } else if (screen === "take-cash") {
      timerRef.current = setTimeout(() => setScreen("thanks"), 4000);
    } else if (screen === "thanks") {
      timerRef.current = setTimeout(() => {
        resetTransaction();
        setScreen("main");
      }, 3000);
    }
    return () => clearTimeout(timerRef.current);
  }, [screen, transactionType]);

  const resetTransaction = () => {
    setTransactionType("");
    setCurrentStudent(null);
    setTargetStudent(null);
    setPasswordInput("");
    setAmount(0);
    setCustomAmount("");
  };

  const openSettings = () => {
    setEditSettings(JSON.parse(JSON.stringify(settings)));
    setEditStudents(students.map(s => ({ ...s })));
    setSettingsTab("general");
    setNewStudent({ name: "", password: "", balance: "" });
    setBulkBalance("");
    setScreen("settings");
  };

  const saveSettings = () => {
    if (!editSettings.storeName.trim()) { alert("은행 이름을 입력해 주세요."); return; }
    // 학생 검증
    for (const s of editStudents) {
      if (!s.name || !s.name.trim()) { alert("이름이 비어있는 친구가 있어요."); return; }
      if (!s.password || !/^\d{4}$/.test(s.password)) { alert(`'${s.name}'의 비밀번호는 4자리 숫자여야 해요.`); return; }
      if (!Number.isFinite(s.balance) || s.balance < 0) { alert(`'${s.name}'의 잔고를 올바르게 입력해 주세요.`); return; }
    }
    setSettings(editSettings);
    persistStudents(editStudents.map(s => ({ ...s })));
    try { localStorage.setItem("atm-settings", JSON.stringify(editSettings)); } catch {}
    setScreen("main");
  };

  const addStudent = () => {
    const name = (newStudent.name || "").trim();
    const pwd = (newStudent.password || "").trim();
    const bal = parseInt(String(newStudent.balance).replace(/[^0-9]/g, ""), 10);
    if (!name) { alert("이름을 입력해 주세요."); return; }
    if (!/^\d{4}$/.test(pwd)) { alert("비밀번호는 숫자 4자리여야 해요."); return; }
    if (!Number.isFinite(bal) || bal < 0) { alert("잔고를 올바르게 입력해 주세요."); return; }
    setEditStudents(prev => [...prev, { name, password: pwd, balance: bal }]);
    setNewStudent({ name: "", password: "", balance: "" });
  };

  const removeStudent = (idx) => setEditStudents(prev => prev.filter((_, i) => i !== idx));
  const updateStudent = (idx, patch) => setEditStudents(prev => prev.map((s, i) => i === idx ? { ...s, ...patch } : s));

  const applyBulkBalance = () => {
    const n = parseInt(String(bulkBalance).replace(/[^0-9]/g, ""), 10);
    if (!Number.isFinite(n) || n < 0) { alert("잔고를 올바르게 입력해 주세요."); return; }
    setEditStudents(prev => prev.map(s => ({ ...s, balance: n })));
  };

  // 메인에서 액션 시작
  const startTransaction = (type) => {
    if (students.length === 0) {
      setPopup({ message: "먼저 설정에서 친구(원아)를\n등록해 주세요", type: "info" });
      return;
    }
    resetTransaction();
    setTransactionType(type);
    setScreen("card-insert");
  };

  // 비밀번호 입력
  const onPwdDigit = (d) => {
    if (passwordInput.length >= 4) return;
    setPasswordInput(p => p + String(d));
  };
  const onPwdClear = () => setPasswordInput("");
  const onPwdConfirm = () => {
    if (passwordInput.length !== 4) return;
    const found = students.find(s => s.password === passwordInput);
    if (!found) {
      setPopup({ message: "비밀번호가\n일치하지 않습니다", type: "error" });
      setPasswordInput("");
      return;
    }
    setCurrentStudent(found);
    setPasswordInput("");
    // 다음 단계 분기
    if (transactionType === "inquiry") setScreen("processing");
    else if (transactionType === "transfer") setScreen("confirm-amount");
    else setScreen("amount-select");
  };

  // 금액 선택
  const selectAmount = (n) => {
    setAmount(n);
    setScreen("confirm-amount");
  };

  // 직접 입력
  const onAmountDigit = (d) => {
    if (customAmount.length >= 7) return; // 최대 999만원
    if (customAmount === "" && d === 0) return; // 첫 자리 0 방지
    setCustomAmount(c => c + String(d));
  };
  const onAmountClear = () => setCustomAmount("");
  const onAmountConfirm = () => {
    const n = parseInt(customAmount || "0", 10);
    if (!Number.isFinite(n) || n < 10) { setPopup({ message: "10원 이상 입력해 주세요", type: "info" }); return; }
    if (n % 10 !== 0) { setPopup({ message: "10원 단위로 입력해 주세요", type: "info" }); return; }
    setAmount(n);
    setCustomAmount("");
    setScreen("confirm-amount");
  };

  // 금액 확인 → 처리
  const confirmAndProceed = () => {
    if (transactionType === "withdraw") {
      if (currentStudent.balance < amount) {
        setPopup({
          message: `잔고가 부족해요\n현재 잔고: ${fmtMoney(currentStudent.balance)}`,
          type: "error",
          onClose: () => { setPopup(null); setScreen("amount-select"); }
        });
        return;
      }
      // 잔고 차감 + 저장
      const newStudents = students.map(s => s.password === currentStudent.password ? { ...s, balance: s.balance - amount } : s);
      persistStudents(newStudents);
      setCurrentStudent(c => ({ ...c, balance: c.balance - amount }));
      setScreen("processing");
    } else if (transactionType === "deposit") {
      setScreen("deposit-cash"); // 현금 투입 화면 먼저 → 자동 processing → 잔고 반영
    } else if (transactionType === "transfer") {
      // 송금: 비밀번호는 아직 입력 전 (transfer는 금액→비밀번호 순서)
      if (currentStudent === null) {
        // 비밀번호 입력 안 됐으면 비밀번호 화면으로
        setScreen("password");
        return;
      }
      if (currentStudent.password === targetStudent.password) {
        setPopup({
          message: "자기 자신에게는\n송금할 수 없어요",
          type: "error",
          onClose: () => { setPopup(null); setScreen("friend-select"); }
        });
        return;
      }
      if (currentStudent.balance < amount) {
        setPopup({
          message: `잔고가 부족해요\n현재 잔고: ${fmtMoney(currentStudent.balance)}`,
          type: "error",
          onClose: () => { setPopup(null); setScreen("amount-select"); }
        });
        return;
      }
      // 송금 처리
      const newStudents = students.map(s => {
        if (s.password === currentStudent.password) return { ...s, balance: s.balance - amount };
        if (s.password === targetStudent.password) return { ...s, balance: s.balance + amount };
        return s;
      });
      persistStudents(newStudents);
      setCurrentStudent(c => ({ ...c, balance: c.balance - amount }));
      setScreen("processing");
    }
  };

  // 입금 현금 투입 끝나면 잔고 반영
  useEffect(() => {
    if (screen === "processing" && transactionType === "deposit" && currentStudent) {
      // processing 진입 시점에 잔고 가산
      const newStudents = students.map(s => s.password === currentStudent.password ? { ...s, balance: s.balance + amount } : s);
      persistStudents(newStudents);
      setCurrentStudent(c => ({ ...c, balance: c.balance + amount }));
    }
  }, [screen]);

  const FULL = { height: "100%", display: "flex", flexDirection: "column", fontFamily: "'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" };

  // ─── 커스텀 팝업 (얼럿 대체) ───
  const PopupOverlay = () => {
    if (!popup) return null;
    const handleClose = () => {
      if (popup.onClose) popup.onClose();
      else setPopup(null);
    };
    const isError = popup.type === "error";
    return (
      <div onClick={handleClose} style={{
        position: "fixed", inset: 0, background: "rgba(15,23,42,0.55)", zIndex: 1000,
        display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
        animation: "fade .15s ease both"
      }}>
        <div onClick={e => e.stopPropagation()} style={{
          background: "white", borderRadius: 24, width: "100%", maxWidth: 380,
          boxShadow: "0 24px 60px rgba(0,0,0,0.32)",
          animation: "pop .25s cubic-bezier(0.34, 1.56, 0.64, 1) both",
          padding: "32px 28px 24px",
          textAlign: "center"
        }}>
          <div style={{
            width: 72, height: 72, borderRadius: "50%",
            background: isError ? "#FEE2E2" : `${TH}18`,
            color: isError ? "#DC2626" : TH,
            display: "flex", alignItems: "center", justifyContent: "center",
            margin: "0 auto 18px",
            fontSize: 38, fontWeight: 900,
            boxShadow: isError ? "0 8px 20px rgba(220,38,38,.25)" : `0 8px 20px ${TH}33`
          }}>{isError ? "!" : "ⓘ"}</div>
          <div style={{
            fontSize: 17, fontWeight: 800, color: "#0f172a", lineHeight: 1.55,
            whiteSpace: "pre-line", marginBottom: 26
          }}>{popup.message}</div>
          <button onClick={handleClose} style={{
            width: "100%", padding: "16px",
            background: isError ? "#DC2626" : TH, color: "white", border: "none",
            borderRadius: 14, fontSize: 16, fontWeight: 900, cursor: "pointer",
            boxShadow: isError ? "0 8px 20px rgba(220,38,38,.45)" : `0 8px 20px ${TH}55`
          }}>확인</button>
        </div>
      </div>
    );
  };

  // 우측 상단 컨트롤
  const TopRight = ({ showSettings = true }) => (
    <div style={{ position: "absolute", top: 16, right: 16, display: "flex", gap: 10, zIndex: 10 }}>
      <button onClick={toggleFullscreen} aria-label="전체화면" style={{
        background: "rgba(255,255,255,0.86)", border: "3px solid rgba(255,255,255,.95)",
        borderRadius: "50%", width: "clamp(44px, 6.5vw, 58px)", height: "clamp(44px, 6.5vw, 58px)",
        fontSize: "clamp(17px, 2.6vw, 22px)", display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: `0 10px 22px ${TH}30`, cursor: "pointer", backdropFilter: "blur(8px)"
      }}>⛶</button>
      {showSettings && (
        <button onClick={openSettings} aria-label="설정" style={{
          background: "rgba(255,255,255,0.86)", border: "3px solid rgba(255,255,255,.95)",
          borderRadius: "50%", width: "clamp(44px, 6.5vw, 58px)", height: "clamp(44px, 6.5vw, 58px)",
          fontSize: "clamp(19px, 3vw, 26px)", display: "flex", alignItems: "center", justifyContent: "center",
          boxShadow: `0 10px 22px ${TH}30`, cursor: "pointer", backdropFilter: "blur(8px)"
        }}>⚙️</button>
      )}
    </div>
  );

  // ───────────────── SETTINGS ─────────────────
  if (screen === "settings") {
    const eth = editTheme.value;
    return (
      <div style={{ ...FULL, background: "#f8fafc" }}>
        <div style={{ background: eth, padding: "16px 20px 0", color: "white", flexShrink: 0 }}>
          <button onClick={() => setScreen("main")} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.85)", fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 8 }}>← 이전</button>
          <h2 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>설정</h2>
          <div style={{ display: "flex", marginTop: 14 }}>
            {[{ k: "general", l: "⚙️ 일반" }, { k: "class", l: "👥 우리반 관리" }].map(t => (
              <button key={t.k} onClick={() => setSettingsTab(t.k)} style={{
                flex: 1, padding: "12px 0", background: "none", border: "none",
                color: settingsTab === t.k ? "white" : "rgba(255,255,255,0.55)",
                fontWeight: settingsTab === t.k ? "800" : "500",
                fontSize: 15, cursor: "pointer",
                borderBottom: settingsTab === t.k ? "3px solid white" : "3px solid transparent"
              }}>{t.l}</button>
            ))}
          </div>
        </div>

        <div className="scrollY" style={{ flex: 1, overflowY: "auto", padding: "22px 18px 32px" }}>
          <div style={{ maxWidth: 720, margin: "0 auto" }}>
            {settingsTab === "general" ? (
              <>
                {/* 은행 이름 */}
                <section style={{ background: "white", borderRadius: 18, padding: 20, marginBottom: 16, boxShadow: "0 4px 18px rgba(15,23,42,.06)" }}>
                  <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 12, color: "#334155" }}>은행 이름</h3>
                  <input
                    value={editSettings.storeName}
                    onChange={e => setEditSettings(s => ({ ...s, storeName: e.target.value }))}
                    placeholder="은행 이름"
                    style={{ width: "100%", padding: 14, border: "2px solid #e2e8f0", borderRadius: 12, fontSize: 16, outline: "none" }}
                    onFocus={e => e.target.style.borderColor = eth}
                    onBlur={e => e.target.style.borderColor = "#e2e8f0"}
                  />
                </section>

                {/* 테마 컬러 */}
                <section style={{ background: "white", borderRadius: 18, padding: 20, marginBottom: 16, boxShadow: "0 4px 18px rgba(15,23,42,.06)" }}>
                  <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 4, color: "#334155" }}>테마 색상</h3>
                  <p style={{ fontSize: 12, color: "#64748b", marginBottom: 14 }}>선택한 색으로 화면 배경과 버튼 색이 함께 바뀝니다</p>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(110px, 1fr))", gap: 12 }}>
                    {PALETTE.map(c => {
                      const selected = editSettings.themeColor === c.value;
                      return (
                        <button key={c.value} onClick={() => setEditSettings(s => ({ ...s, themeColor: c.value }))} style={{
                          background: bgOf(c), border: selected ? `3px solid ${c.value}` : "3px solid transparent",
                          borderRadius: 14, padding: "14px 8px", cursor: "pointer",
                          display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
                          boxShadow: selected ? `0 6px 16px ${c.value}55` : "0 2px 8px rgba(15,23,42,.06)",
                        }}>
                          <div style={{ width: 36, height: 36, borderRadius: "50%", background: c.value, boxShadow: "0 2px 6px rgba(0,0,0,0.18)" }} />
                          <span style={{ fontSize: 13, color: "#1f2937", fontWeight: 700 }}>{c.label}</span>
                        </button>
                      );
                    })}
                  </div>
                </section>
              </>
            ) : (
              <>
                {/* 잔고 일괄 입력 */}
                <section style={{ background: `${eth}10`, borderRadius: 18, padding: 20, marginBottom: 16, border: `2px dashed ${eth}50` }}>
                  <h3 style={{ fontSize: 15, fontWeight: 800, marginBottom: 10, color: "#334155" }}>💰 잔고 일괄 입력</h3>
                  <p style={{ fontSize: 12, color: "#64748b", marginBottom: 12 }}>모든 친구의 잔고를 같은 금액으로 설정합니다</p>
                  <div style={{ display: "flex", gap: 8 }}>
                    <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 4, background: "white", borderRadius: 10, padding: "0 14px", border: "1.5px solid #e2e8f0" }}>
                      <input
                        type="text" inputMode="numeric"
                        value={bulkBalance}
                        onChange={e => setBulkBalance(e.target.value.replace(/[^0-9]/g, ""))}
                        placeholder="50000"
                        style={{ flex: 1, padding: "12px 0", border: "none", fontSize: 16, outline: "none", textAlign: "right", background: "transparent" }}
                      />
                      <span style={{ fontSize: 14, color: "#475569", fontWeight: 700 }}>원</span>
                    </div>
                    <button onClick={applyBulkBalance} disabled={editStudents.length === 0} style={{
                      padding: "0 18px", background: editStudents.length === 0 ? "#cbd5e1" : eth, color: "white",
                      border: "none", borderRadius: 10, fontSize: 14, fontWeight: 800,
                      cursor: editStudents.length === 0 ? "default" : "pointer"
                    }}>전체 적용</button>
                  </div>
                </section>

                {/* 학생 리스트 */}
                <section style={{ background: "white", borderRadius: 18, padding: 20, marginBottom: 16, boxShadow: "0 4px 18px rgba(15,23,42,.06)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
                    <h3 style={{ fontSize: 16, fontWeight: 800, color: "#334155" }}>등록된 친구</h3>
                    <span style={{ fontSize: 13, color: "#64748b", fontWeight: 700 }}>{editStudents.length}명</span>
                  </div>
                  {editStudents.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "30px 0", color: "#94a3b8" }}>
                      <div style={{ fontSize: 36, marginBottom: 8 }}>👥</div>
                      <p style={{ fontSize: 14 }}>등록된 친구가 없어요</p>
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {editStudents.map((s, i) => (
                        <div key={i} style={{ background: "#f8fafc", borderRadius: 12, padding: 14, border: "1.5px solid #e2e8f0" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                            <div style={{ flex: 1 }}>
                              <input
                                value={s.name}
                                onChange={e => updateStudent(i, { name: e.target.value })}
                                placeholder="이름"
                                style={{ width: "100%", padding: 10, border: "1.5px solid #e2e8f0", borderRadius: 8, fontSize: 15, fontWeight: 700, outline: "none", background: "white" }}
                                onFocus={e => e.target.style.borderColor = eth}
                                onBlur={e => e.target.style.borderColor = "#e2e8f0"}
                              />
                            </div>
                            <button onClick={() => removeStudent(i)} style={{ width: 36, height: 36, border: "none", borderRadius: 8, background: "#FEE2E2", color: "#DC2626", cursor: "pointer", fontSize: 16, fontWeight: 800 }}>−</button>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                            <div>
                              <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700, marginBottom: 4 }}>비밀번호 (4자리)</div>
                              <input
                                type="text" inputMode="numeric" maxLength={4}
                                value={s.password}
                                onChange={e => updateStudent(i, { password: e.target.value.replace(/[^0-9]/g, "").slice(0,4) })}
                                placeholder="0000"
                                style={{ width: "100%", padding: 10, border: "1.5px solid #cbd5e1", borderRadius: 8, fontSize: 15, outline: "none", textAlign: "center", letterSpacing: 4, background: "white" }}
                              />
                            </div>
                            <div>
                              <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700, marginBottom: 4 }}>잔고 (원)</div>
                              <div style={{ display: "flex", alignItems: "center", gap: 4, background: "white", borderRadius: 8, padding: "0 10px", border: "1.5px solid #cbd5e1" }}>
                                <input
                                  type="text" inputMode="numeric"
                                  value={s.balance}
                                  onChange={e => {
                                    const n = parseInt(e.target.value.replace(/[^0-9]/g, ""), 10);
                                    updateStudent(i, { balance: Number.isFinite(n) ? n : 0 });
                                  }}
                                  placeholder="0"
                                  style={{ flex: 1, padding: "10px 0", border: "none", fontSize: 15, outline: "none", textAlign: "right", background: "transparent" }}
                                />
                                <span style={{ fontSize: 12, color: "#475569" }}>원</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </section>

                {/* 친구 추가 */}
                <section style={{ background: `${eth}08`, borderRadius: 18, padding: 20, marginBottom: 16, border: `1.5px dashed ${eth}70` }}>
                  <h3 style={{ fontSize: 15, fontWeight: 800, color: eth, marginBottom: 14 }}>+ 친구 추가</h3>
                  <input
                    value={newStudent.name}
                    onChange={e => setNewStudent(s => ({ ...s, name: e.target.value }))}
                    placeholder="이름"
                    style={{ width: "100%", padding: 12, border: "1.5px solid #e2e8f0", borderRadius: 10, fontSize: 15, marginBottom: 8, outline: "none", background: "white" }}
                  />
                  <input
                    type="text" inputMode="numeric" maxLength={4}
                    value={newStudent.password}
                    onChange={e => setNewStudent(s => ({ ...s, password: e.target.value.replace(/[^0-9]/g, "").slice(0,4) }))}
                    placeholder="비밀번호 4자리 (예: 1234)"
                    style={{ width: "100%", padding: 12, border: "1.5px solid #e2e8f0", borderRadius: 10, fontSize: 15, marginBottom: 8, outline: "none", background: "white", letterSpacing: 4, textAlign: "center" }}
                  />
                  <div style={{ display: "flex", alignItems: "center", gap: 4, background: "white", borderRadius: 10, padding: "0 14px", border: "1.5px solid #e2e8f0", marginBottom: 10 }}>
                    <input
                      type="text" inputMode="numeric"
                      value={newStudent.balance}
                      onChange={e => setNewStudent(s => ({ ...s, balance: e.target.value.replace(/[^0-9]/g, "") }))}
                      placeholder="시작 잔고 (예: 50000)"
                      style={{ flex: 1, padding: "12px 0", border: "none", fontSize: 15, outline: "none", textAlign: "right", background: "transparent" }}
                    />
                    <span style={{ fontSize: 13, color: "#475569" }}>원</span>
                  </div>
                  <button onClick={addStudent} style={{ width: "100%", padding: 14, background: eth, color: "white", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 800, cursor: "pointer" }}>추가하기</button>
                </section>
              </>
            )}

            <button onClick={saveSettings} style={{
              background: eth, color: "white", border: "none", borderRadius: 14,
              padding: 18, fontSize: 17, fontWeight: 800, width: "100%", cursor: "pointer",
              boxShadow: `0 8px 22px ${eth}55`
            }}>저장하기</button>
          </div>
        </div>
      </div>
    );
  }

  // ───────────────── MAIN ─────────────────
  if (screen === "main") return (

      <PopupOverlay />

  // ───────────────── CARD INSERT ─────────────────
  if (screen === "card-insert") return (

  // ───────────────── PASSWORD ─────────────────
  if (screen === "password") return (
    <div style={{ ...FULL, background: BG, position: "relative" }}>

  if (screen === "friend-select") {

  if (screen === "amount-select") {

              <div style={{ fontSize: 17, color: TH, fontWeight: 800, marginBottom: 6 }}>
                {transactionType === "withdraw" ? "💵 출금" : transactionType === "deposit" ? "💰 입금" : "📤 송금"}

    return (
      <div style={{ ...FULL, background: BG, position: "relative" }}>

        <div className="scrollY" style={{ flex: 1, overflowY: "auto", padding: "30px 20px 30px", display: "flex", flexDirection: "column", alignItems: "center" }}>

          </div>

          <Keypad
            onDigit={onAmountDigit}
            onClear={onAmountClear}

          />
          <button onClick={() => setScreen("amount-select")} style={{
            marginTop: 20, background: "transparent", color: "#475569", border: "1.5px solid #cbd5e1",

          }}>← 이전</button>
        </div>
        <PopupOverlay />
      </div>
    );
  }

  // ───────────────── CONFIRM AMOUNT ─────────────────
  if (screen === "confirm-amount") {
    // transfer 일 때 currentStudent === null 이면 비밀번호부터 받기

      <div style={{ ...FULL, background: BG, position: "relative" }}>

          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 17, color: TH, fontWeight: 800, marginBottom: 8 }}>

            <div style={{ fontSize: "clamp(30px, 5vw, 46px)", fontWeight: 900, color: "#0f172a", letterSpacing: "-1.5px", textShadow: "0 2px 0 #fff" }}>

            </div>

            background: "white", border: `4px solid ${TH}`, borderRadius: 28,

            <div style={{
              fontSize: "clamp(50px, 8vw, 80px)", fontWeight: 900, color: TH,
              letterSpacing: -2.5, lineHeight: 1.1

            <button onClick={needPassword ? () => setScreen("password") : confirmAndProceed} style={{
              flex: 2, background: `linear-gradient(135deg, ${TH} 0%, ${TH_DARK} 100%)`, color: "white", border: "none",

          </div>
        </div>
        <PopupOverlay />
      </div>

  }

  // ───────────────── DEPOSIT CASH (현금 투입) ─────────────────
  if (screen === "deposit-cash") return (
    <div style={{ ...FULL, background: BG, position: "relative" }}>
      <TopRight />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "30px 20px" }}>

  // ───────────────── PROCESSING ─────────────────
  if (screen === "processing") return (
    <div style={{ ...FULL, background: BG, alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
        <div style={{ width: 140, height: 140, borderRadius: "50%", background: TH, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 14px 36px ${TH}55`, marginBottom: 28, animation: "pop .5s cubic-bezier(0.34, 1.56, 0.64, 1) both" }}>
          <span style={{ fontSize: 70 }}>⏳</span>
        </div>

  // ───────────────── TAKE CARD ─────────────────
  if (screen === "take-card") return (
    <div style={{ ...FULL, background: BG, position: "relative" }}>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "30px 20px" }}>
        <div style={{ fontSize: "clamp(30px, 5.2vw, 52px)", fontWeight: 900, color: "#0f172a", marginBottom: 10, textAlign: "center", textShadow: "0 2px 0 #fff" }}>
          카드나 통장을 <span style={{ color: TH }}>가져가 주세요</span>
        </div>
        <div style={{ fontSize: 17, color: "#64748b", fontWeight: 700, marginBottom: 28 }}>⏳ 잠시 후 다음 화면으로 넘어갑니다</div>
        <InsertVisual direction="up" color={TH} />
      </div>
    </div>
  );

  // ───────────────── TAKE CASH (출금) ─────────────────
  if (screen === "take-cash") return (
    <div style={{ ...FULL, background: BG, position: "relative" }}>
      <TopRight />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "30px 20px", textAlign: "center" }}>
        <div style={{ fontSize: "clamp(28px, 4.8vw, 44px)", fontWeight: 900, color: "#0f172a", marginBottom: 8, textShadow: "0 2px 0 #fff", lineHeight: 1.4 }}>

        </div>
        <div style={{ fontSize: "clamp(22px, 3.6vw, 32px)", fontWeight: 800, color: "#334155", marginBottom: 26, textShadow: "0 2px 0 #fff" }}>

        <CashVisual direction="out" />
      </div>
    </div>

  // ───────────────── INQUIRY RESULT ─────────────────
  if (screen === "inquiry-result") return (
    <div style={{ ...FULL, background: BG, position: "relative" }}>
      <TopRight />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "30px 20px" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 17, color: TH, fontWeight: 800, marginBottom: 8 }}>📋 잔고 조회</div>
          <div style={{ fontSize: "clamp(28px, 4.4vw, 40px)", fontWeight: 900, color: "#0f172a", textShadow: "0 2px 0 #fff" }}>
            <span style={{ color: TH }}>{currentStudent?.name}</span>님의 잔고
          </div>

        <div style={{
          background: "white", border: `4px solid ${TH}`, borderRadius: 32,

          <div style={{ fontSize: "clamp(54px, 9vw, 92px)", fontWeight: 900, color: TH, letterSpacing: -2.5 }}>{fmtMoney(currentStudent?.balance || 0)}</div>
        </div>
        <button onClick={() => setScreen("take-card")} style={{
          background: `linear-gradient(135deg, ${TH} 0%, ${TH_DARK} 100%)`,

          padding: "20px 72px", fontSize: 22, fontWeight: 900, cursor: "pointer",
          boxShadow: `0 10px 24px ${TH}55`
        }}>확인</button>
      </div>
    </div>
